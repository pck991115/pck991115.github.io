<ul>
<li>收件箱只保留一周；</li>
<li>同一主题同时进行的材料不超过三个；</li>
<li>每份材料都要产生一条自己的笔记或一个实践动作。</li>
</ul>
<p>限制减少了“以后可能有用”的幻觉，也让我更容易判断什么值得继续投入。</p> </div> </article>  </main> </body></html>
